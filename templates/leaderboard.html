
<!DOCTYPE html>

<html>
<head>
    <title>BotThisSite Leaderboard</title>
</head>
<body>
<h1>Leaderboard</h1>
Total captchas solved: {{total_solved}} <br>
Last updated: {{cache_age}}s ago.

<table>
<thead>

    <tr>
        <th>
            Rank
        </th>
        <th>
            Name
        </th>
        <th>
            Captchas Solved
        </th>
    </tr>
</thead>

<tbody>

    {% for user in users %}
    <tr>
        <td>{{loop.index}}</td>
        <td>{{user.username}}</td>
        <td>{{user.cloudflare_turnstiles_solved}}</td>
    </tr>
    {% endfor %}
</tbody>
</table>
:3
</body>
</html>
