<!DOCTYPE html>
<html>
<head>
    <title>BotThisSite User Solve Graphs</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; }
        #chart-wrap { position: relative; height: 60vh; }
        .controls { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>User solves over time</h1>
    <p><a href="/data">captcha solves</a> and <a href="/leaderboard">leaderboard</a> and <a href="/">home</a></p>

    <div class="controls">
        <label>Bucket:
            <select id="bucket">
                <option value="day" selected>day</option>
                <option value="hour">hour</option>
                <option value="5min">5min</option>
            </select>
        </label>
    </div>

    <div id="chart-wrap">
        <canvas id="userSolvesChart"></canvas>
    </div>

    <script>
        function color(i, alpha) {
            const hue = (i * 137.508) % 360;
            return `hsl(${hue} 70% 55% / ${alpha})`;
        }

        let chart = null;

        async function draw() {
            const bucket = document.getElementById("bucket").value;
            const res = await fetch(`/api/graphs/user-solves?bucket=${bucket}`);
            const { labels, series } = await res.json();

            const datasets = series.map((s, i) => ({
                label: s.name,
                data: s.counts,
                borderColor: color(i, 1),
                backgroundColor: color(i, 0.15),
                tension: 0.3,
                pointRadius: 2,
                fill: false,
            }));

            if (chart) chart.destroy();
            chart = new Chart(document.getElementById("userSolvesChart"), {
                type: "line",
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: "index", intersect: false },
                    plugins: {
                        title: { display: true, text: `User solves per ${bucket}` },
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { precision: 0 } },
                    },
                },
            });
        }

        document.getElementById("bucket").addEventListener("change", draw);
        draw();
    </script>
</body>
</html>
